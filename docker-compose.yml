version: '3.8'

services:
  consul:
    build:
      context: .
      dockerfile: docker/consul.Dockerfile
    ports:
      - "8500:8500"
    volumes:
      - consul_data:/app
    networks:
      - orbis-net

  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - CONSUL_ADDR=http://consul:8500
    depends_on:
      - consul
    networks:
      - orbis-net

networks:
  orbis-net:
    driver: bridge

volumes:
  consul_data:
